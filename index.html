<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ultimate Clicker Evolution</title>
    <style>
        body { font-family: sans-serif; background: #1a1a22; color: #fff; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .game-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 900px; }
        .admin-panel { background: #331111; padding: 20px; border: 2px solid #ff0000; margin-top: 20px; border-radius: 10px; width: 100%; max-width: 800px; }
        .admin-name { color: #ffcc00 !important; font-weight: bold; text-shadow: 0 0 5px rgba(255, 204, 0, 0.5); }
        button { padding: 10px; cursor: pointer; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <h1>Ultimate Clicker Evolution</h1>
    <div class="game-container">
        <div>
            <h1 id="score">0</h1>
            <button onclick="clickAction()" id="main-click-btn">CLICK ME!</button>
        </div>
        <div>
            <h3>GLOBAL LEADERBOARD</h3>
            <div id="leaderboard-container"></div>
        </div>
    </div>

    <div id="admin-panel" class="admin-panel" style="display:none;">
        <h3 style="color:#ff4444;">GOD MODE CONTROLS</h3>
        <input type="text" id="target-player" placeholder="Player Name">
        <input type="number" id="new-score" placeholder="New Score">
        <button onclick="adminModifyScore()">Set Score</button>
        <button onclick="adminToggleBan()">Ban/Unban</button>
        <button onclick="adminTriggerFrenzy()" style="background:#ffcc00;">START GLOBAL FRENZY</button>
    </div>
    <button onclick="loginAdmin()">Admin Login</button>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDHPOYhJ4Iw5bRx83xf0P9bV6U-AE7lAJo", authDomain: "ultimate-clicker-57b78.firebaseapp.com", projectId: "ultimate-clicker-57b78", storageBucket: "ultimate-clicker-57b78.firebasestorage.app", messagingSenderId: "62006979685", appId: "1:62006979685:web:ae4f3b4f0bc330c58daa8c" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let score = 0;
        let username = localStorage.getItem('clickerUsername') || prompt("Name?");
        localStorage.setItem('clickerUsername', username);

        // Leaderboard with Gold Name Logic
        db.collection("leaderboard").orderBy("highScore", "desc").onSnapshot(snapshot => {
            const container = document.getElementById("leaderboard-container");
            container.innerHTML = "";
            snapshot.forEach(doc => {
                const data = doc.data();
                const isGold = data.isAdmin ? "admin-name" : "";
                container.innerHTML += `<div class="${isGold}">${data.name}: ${Math.floor(data.highScore)}</div>`;
            });
        });

        // God Mode & Admin Logic
        async function syncLeaderboard() {
            const user = firebase.auth().currentUser;
            const isAdmin = user && user.email === "paragsharma1101edu@gmail.com";
            await db.collection("leaderboard").doc(username).set({ name: username, highScore: score, isAdmin: isAdmin }, { merge: true });
        }

        function loginAdmin() {
            firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider()).then(res => {
                if(res.user.email === "paragsharma1101edu@gmail.com") document.getElementById('admin-panel').style.display = "block";
            });
        }

        async function adminModifyScore() {
            const name = document.getElementById('target-player').value;
            const s = parseInt(document.getElementById('new-score').value);
            await db.collection("leaderboard").doc(name).update({ highScore: s });
        }

        async function adminToggleBan() {
            const name = document.getElementById('target-player').value;
            const doc = await db.collection("leaderboard").doc(name).get();
            await db.collection("leaderboard").doc(name).update({ isBanned: !doc.data().isBanned });
        }

        async function adminTriggerFrenzy() {
            await db.collection("global_events").doc("frenzy").set({ active: true, timestamp: Date.now() });
        }

        function clickAction() { score++; document.getElementById('score').innerText = score; syncLeaderboard(); }
    </script>
</body>
</html>
