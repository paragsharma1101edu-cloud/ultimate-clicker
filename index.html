<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Clicker Evolution - Mega Edition</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a22;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .game-container {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 25px;
            background-color: #23232e;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            max-width: 950px;
            width: 100%;
            z-index: 10;
        }

        .click-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-right: 2px solid #333344;
            padding-right: 20px;
            position: relative;
        }

        h1 {
            font-size: 3.5rem;
            margin: 5px 0;
            color: #00ffcc;
            text-shadow: 0 0 10px rgba(0,255,204,0.3);
        }

        .score-display {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: #bbb;
        }

        #frenzy-banner {
            display: none;
            background-color: #ffcc00;
            color: #111;
            padding: 5px 15px;
            font-weight: bold;
            border-radius: 20px;
            margin-bottom: 15px;
            animation: pulse 0.5s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        #main-click-btn {
            width: 190px;
            height: 190px;
            background: radial-gradient(circle, #ff4d4d, #cc0000);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 1.6rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 0 #990000, 0 15px 20px rgba(0,0,0,0.4);
            transition: all 0.1s ease;
            outline: none;
            user-select: none;
        }

        #main-click-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #990000, 0 5px 10px rgba(0,0,0,0.4);
        }

        .shop-scroll {
            max-height: 550px;
            overflow-y: auto;
            padding-right: 8px;
        }

        /* Custom Scrollbar */
        .shop-scroll::-webkit-scrollbar { width: 6px; }
        .shop-scroll::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }

        .panel-title {
            font-size: 1.2rem;
            margin: 15px 0 5px 0;
            color: #ffcc00;
            border-bottom: 1px solid #3a3a45;
            padding-bottom: 3px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-upgrade {
            background-color: #2e2e3e;
            color: white;
            border: 1px solid #444;
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
            width: 100%;
            margin-bottom: 8px;
        }

        .btn-upgrade:hover:not(:disabled) {
            background-color: #3d3d52;
            border-color: #00ffcc;
        }

        .btn-upgrade:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .upgrade-info span { display: block; }
        .upgrade-name { font-weight: bold; font-size: 0.95rem; }
        .upgrade-desc { font-size: 0.8rem; color: #aaa; }
        .cost { font-weight: bold; color: #ffcc00; font-size: 0.95rem; }

        /* Tech Research Color Variant */
        .tech-upgrade { border-left: 4px solid #ffcc00; }
        .tech-upgrade.purchased { border-left-color: #00ffcc; opacity: 0.7; }

        .achievements-container {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 5px;
        }

        .achievement {
            background-color: #25252b;
            padding: 6px 10px;
            border-radius: 5px;
            font-size: 0.75rem;
            color: #555;
            border: 1px solid #333;
            transition: all 0.3s ease;
        }

        .achievement.unlocked {
            background-color: #143d30;
            color: #00ffcc;
            border-color: #00ffcc;
        }

        .save-controls {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-system {
            flex: 1;
            padding: 8px;
            background-color: #1a1a22;
            color: #ccc;
            border: 1px solid #444;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .btn-system:hover { background-color: #2b2b36; color: #fff; }

        /* Floating Golden Star Event */
        #golden-star {
            position: absolute;
            width: 50px;
            height: 50px;
            background: radial-gradient(circle, #fff700, #ffaa00);
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            cursor: pointer;
            display: none;
            z-index: 100;
            box-shadow: 0 0 15px #ffcc00;
            animation: spin 3s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="golden-star"></div>

    <div class="game-container">
        <div class="click-section">
            <div id="frenzy-banner">🔥 CLICK FRENZY (7X POWER)! <span id="frenzy-timer">10</span>s</div>
            <h1 id="score">0</h1>
            <div class="score-display">Clicks / Sec: <span id="cps">0</span></div>
            <button id="main-click-btn">CLICK ME!</button>
            
            <div style="width:100%;">
                <div class="panel-title">System Data</div>
                <div class="save-controls">
                    <button class="btn-system" id="btn-save">Save Game</button>
                    <button class="btn-system" id="btn-reset" style="border-color: #552222; color: #ffaa00;">Reset Data</button>
                </div>
            </div>
        </div>

        <div class="shop-scroll">
            <div class="panel-title">Tech Research</div>
            
            <button class="btn-upgrade tech-upgrade" id="buy-tech-overclock">
                <div class="upgrade-info">
                    <span class="upgrade-name">Overclock Engines</span>
                    <span class="upgrade-desc">Permanently doubles (2x) total Autoclicker speed!</span>
                </div>
                <div class="cost" id="tech-overclock-cost">500 Clicks</div>
            </button>

            <button class="btn-upgrade tech-upgrade" id="buy-tech-nuclear">
                <div class="upgrade-info">
                    <span class="upgrade-name">Nuclear Energy</span>
                    <span class="upgrade-desc">Permanently multiplies (5x) manual base Click Power!</span>
                </div>
                <div class="cost" id="tech-nuclear-cost">5,000 Clicks</div>
            </button>

            <div class="panel-title">Hardware Upgrades</div>
            
            <button class="btn-upgrade" id="buy-click-power">
                <div class="upgrade-info">
                    <span class="upgrade-name">Sharper Finger (+1 Base Power)</span>
                    <span class="upgrade-desc">Current level: <span id="click-power-lvl">1</span> (Yields <span id="click-yield-val">1</span>/click)</span>
                </div>
                <div class="cost" id="click-power-cost">15 Clicks</div>
            </button>

            <button class="btn-upgrade" id="buy-tier1">
                <div class="upgrade-info">
                    <span class="upgrade-name">Tier 1 Autoclicker (+1 CPS)</span>
                    <span class="upgrade-desc">Automated structural click taps. (Owned: <span id="t1-count">0</span>)</span>
                </div>
                <div class="cost" id="tier1-cost">50 Clicks</div>
            </button>

            <button class="btn-upgrade" id="buy-tier2">
                <div class="upgrade-info">
                    <span class="upgrade-name">Tier 2 Autoclicker (+5 CPS)</span>
                    <span class="upgrade-desc">Super-charged automated motor pistons. (Owned: <span id="t2-count">0</span>)</span>
                </div>
                <div class="cost" id="tier2-cost">250 Clicks</div>
            </button>

            <button class="btn-upgrade" id="buy-tier3">
                <div class="upgrade-info">
                    <span class="upgrade-name">Tier 3 Click Farm (+25 CPS)</span>
                    <span class="upgrade-desc">A network grid devoted strictly to clicks. (Owned: <span id="t3-count">0</span>)</span>
                </div>
                <div class="cost" id="tier3-cost">1,200 Clicks</div>
            </button>

            <button class="btn-upgrade" id="buy-tier4">
                <div class="upgrade-info">
                    <span class="upgrade-name">Tier 4 Quantum Core (+150 CPS)</span>
                    <span class="upgrade-desc">Bends timelines to unlock infinite machine clicks. (Owned: <span id="t4-count">0</span>)</span>
                </div>
                <div class="cost" id="tier4-cost">7,500 Clicks</div>
            </button>

            <div class="panel-title">Milestone Achievements</div>
            <div class="achievements-container">
                <div class="achievement" id="ach-1">First Click</div>
                <div class="achievement" id="ach-100">Centurion (100)</div>
                <div class="achievement" id="ach-10k">Industrialist (10k Clicks)</div>
                <div class="achievement" id="ach-speed">Speed Demon (15 CPS)</div>
                <div class="achievement" id="ach-frenzy">Cosmic Luck (Catch Star)</div>
            </div>
        </div>
    </div>

    <script>
        // --- GAME STATE ---
        let score = 0;
        let baseClickPower = 1;
        
        // Upgrade prices
        let clickPowerCost = 15;
        let tier1Cost = 50;
        let tier2Cost = 250;
        let tier3Cost = 1200;
        let tier4Cost = 7500;
        let techOverclockCost = 500;
        let techNuclearCost = 5000;

        // Counts
        let tier1Count = 0;
        let tier2Count = 0;
        let tier3Count = 0;
        let tier4Count = 0;

        // Tech Multipliers
        let cpsMultiplier = 1;
        let clickMultiplier = 1;
        let isOverclockBought = false;
        let isNuclearBought = false;

        // Frenzy event mechanics
        let isFrenzyActive = false;
        let frenzyTimeRemaining = 0;

        let achievements = {
            firstClick: false, hundredClicks: false, tenThousandClicks: false, speedDemon: false, cosmicLuck: false
        };

        // --- DOM HOOKS ---
        const scoreEl = document.getElementById('score');
        const cpsEl = document.getElementById('cps');
        const mainBtn = document.getElementById('main-click-btn');
        const starEl = document.getElementById('golden-star');
        const frenzyBanner = document.getElementById('frenzy-banner');
        const frenzyTimerEl = document.getElementById('frenzy-timer');
        
        const buyClickPowerBtn = document.getElementById('buy-click-power');
        const clickPowerLvlEl = document.getElementById('click-power-lvl');
        const clickYieldValEl = document.getElementById('click-yield-val');
        const clickPowerCostEl = document.getElementById('click-power-cost');

        const buyTier1Btn = document.getElementById('buy-tier1');
        const t1CountEl = document.getElementById('t1-count');
        const tier1CostEl = document.getElementById('tier1-cost');

        const buyTier2Btn = document.getElementById('buy-tier2');
        const t2CountEl = document.getElementById('t2-count');
        const tier2CostEl = document.getElementById('tier2-cost');

        const buyTier3Btn = document.getElementById('buy-tier3');
        const t3CountEl = document.getElementById('t3-count');
        const tier3CostEl = document.getElementById('tier3-cost');

        const buyTier4Btn = document.getElementById('buy-tier4');
        const t4CountEl = document.getElementById('t4-count');
        const tier4CostEl = document.getElementById('tier4-cost');

        const buyOverclockBtn = document.getElementById('buy-tech-overclock');
        const buyNuclearBtn = document.getElementById('buy-tech-nuclear');

        // --- CALCULATION LOGIC ---
        function getRawCPS() {
            return (tier1Count * 1) + (tier2Count * 5) + (tier3Count * 25) + (tier4Count * 150);
        }

        function getTotalCPS() {
            return getRawCPS() * cpsMultiplier;
        }

        function getCurrentClickPower() {
            let power = baseClickPower * clickMultiplier;
            if (isFrenzyActive) power *= 7; // 7x during frenzy event!
            return power;
        }

        // --- INTERACTIVE SYNTH SOUND GENERATOR ---
        function playTone(freq, duration, type='sine') {
            try {
                let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                let oscillator = audioCtx.createOscillator();
                let gainNode = audioCtx.createGain();
                
                oscillator.type = type; 
                oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(freq / 4, audioCtx.currentTime + duration);
                
                gainNode.gain.setValueAtTime(0.12, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.005, audioCtx.currentTime + duration);
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }

        // --- UI INTERFACE REFRESH ---
        function updateDisplay() {
            scoreEl.innerText = Math.floor(score);
            cpsEl.innerText = getTotalCPS().toFixed(1);

            clickPowerLvlEl.innerText = baseClickPower;
            clickYieldValEl.innerText = getCurrentClickPower();
            clickPowerCostEl.innerText = clickPowerCost + " Clicks";
            
            t1CountEl.innerText = tier1Count;
            tier1CostEl.innerText = tier1Cost + " Clicks";
            t2CountEl.innerText = tier2Count;
            tier2CostEl.innerText = tier2Cost + " Clicks";
            t3CountEl.innerText = tier3Count;
            tier3CostEl.innerText = tier3Cost + " Clicks";
            t4CountEl.innerText = tier4Count;
            tier4CostEl.innerText = tier4Cost + " Clicks";

            // Tech items handling
            if(isOverclockBought) {
                buyOverclockBtn.disabled = true;
                buyOverclockBtn.classList.add('purchased');
                document.getElementById('tech-overclock-cost').innerText = "Maxed";
            } else {
                buyOverclockBtn.disabled = score < techOverclockCost;
                document.getElementById('tech-overclock-cost').innerText = techOverclockCost + " Clicks";
            }

            if(isNuclearBought) {
                buyNuclearBtn.disabled = true;
                buyNuclearBtn.classList.add('purchased');
                document.getElementById('tech-nuclear-cost').innerText = "Maxed";
            } else {
                buyNuclearBtn.disabled = score < techNuclearCost;
                document.getElementById('tech-nuclear-cost').innerText = techNuclearCost + " Clicks";
            }

            // Normal button disable states
            buyClickPowerBtn.disabled = score < clickPowerCost;
            buyTier1Btn.disabled = score < tier1Cost;
            buyTier2Btn.disabled = score < tier2Cost;
            buyTier3Btn.disabled = score < tier3Cost;
            buyTier4Btn.disabled = score < tier4Cost;

            checkAchievements();
        }

        function checkAchievements() {
            if (score >= 1 && !achievements.firstClick) achievements.firstClick = true;
            if (score >= 100 && !achievements.hundredClicks) achievements.hundredClicks = true;
            if (score >= 10000 && !achievements.tenThousandClicks) achievements.tenThousandClicks = true;
            if (getTotalCPS() >= 15 && !achievements.speedDemon) achievements.speedDemon = true;

            if (achievements.firstClick) document.getElementById('ach-1').classList.add('unlocked');
            if (achievements.hundredClicks) document.getElementById('ach-100').classList.add('unlocked');
            if (achievements.tenThousandClicks) document.getElementById('ach-10k').classList.add('unlocked');
            if (achievements.speedDemon) document.getElementById('ach-speed').classList.add('unlocked');
            if (achievements.cosmicLuck) document.getElementById('ach-frenzy').classList.add('unlocked');
        }

        // --- SAVE SYSTEM ---
        function saveGame() {
            const saveState = {
                score, baseClickPower, clickPowerCost, tier1Cost, tier2Cost, tier3Cost, tier4Cost,
                tier1Count, tier2Count, tier3Count, tier4Count, techOverclockCost, techNuclearCost,
                cpsMultiplier, clickMultiplier, isOverclockBought, isNuclearBought, achievements
            };
            localStorage.setItem('clickerUltimateSave', JSON.stringify(saveState));
        }

        function loadGame() {
            const saved = localStorage.getItem('clickerUltimateSave');
            if (saved) {
                const p = JSON.parse(saved);
                score = p.score || 0;
                baseClickPower = p.baseClickPower || 1;
                clickPowerCost = p.clickPowerCost || 15;
                tier1Cost = p.tier1Cost || 50;
                tier2Cost = p.tier2Cost || 250;
                tier3Cost = p.tier3Cost || 1200;
                tier4Cost = p.tier4Cost || 7500;
                techOverclockCost = p.techOverclockCost || 500;
                techNuclearCost = p.techNuclearCost || 5000;
                tier1Count = p.tier1Count || 0;
                tier2Count = p.tier2Count || 0;
                tier3Count = p.tier3Count || 0;
                tier4Count = p.tier4Count || 0;
                cpsMultiplier = p.cpsMultiplier || 1;
                clickMultiplier = p.clickMultiplier || 1;
                isOverclockBought = p.isOverclockBought || false;
                isNuclearBought = p.isNuclearBought || false;
                achievements = p.achievements || achievements;
            }
            updateDisplay();
        }

        // --- BUTTON EVENTS ---
        mainBtn.addEventListener('click', () => {
            score += getCurrentClickPower();
            playTone(isFrenzyActive ? 850 : 580, 0.08, 'sine');
            updateDisplay();
        });

        buyClickPowerBtn.addEventListener('click', () => {
            if (score >= clickPowerCost) {
                score -= clickPowerCost; baseClickPower += 1;
                clickPowerCost = Math.floor(clickPowerCost * 1.5); updateDisplay();
            }
        });

        buyTier1Btn.addEventListener('click', () => {
            if (score >= tier1Cost) {
                score -= tier1Cost; tier1Count++;
                tier1Cost = Math.floor(tier1Cost * 1.3); updateDisplay();
            }
        });

        buyTier2Btn.addEventListener('click', () => {
            if (score >= tier2Cost) {
                score -= tier2Cost; tier2Count++;
                tier2Cost = Math.floor(tier2Cost * 1.35); updateDisplay();
            }
        });

        buyTier3Btn.addEventListener('click', () => {
            if (score >= tier3Cost) {
                score -= tier3Cost; tier3Count++;
                tier3Cost = Math.floor(tier3Cost * 1.4); updateDisplay();
            }
        });

        buyTier4Btn.addEventListener('click', () => {
            if (score >= tier4Cost) {
                score -= tier4Cost; tier4Count++;
                tier4Cost = Math.floor(tier4Cost * 1.45); updateDisplay();
            }
        });

        buyOverclockBtn.addEventListener('click', () => {
            if (!isOverclockBought && score >= techOverclockCost) {
                score -= techOverclockCost; cpsMultiplier = 2;
                isOverclockBought = true; updateDisplay();
                playTone(400, 0.4, 'triangle');
            }
        });

        buyNuclearBtn.addEventListener('click', () => {
            if (!isNuclearBought && score >= techNuclearCost) {
                score -= techNuclearCost; clickMultiplier = 5;
                isNuclearBought = true; updateDisplay();
                playTone(400, 0.4, 'triangle');
            }
        });

        // --- GOLDEN STAR LOGIC (RANDOM ACTIVE ENCOUNTERS) ---
        function spawnGoldenStar() {
            if (isFrenzyActive) return; // Don't overlay events
            
            const x = Math.random() * (window.innerWidth - 100) + 20;
            const y = Math.random() * (window.innerHeight - 100) + 20;
            
            starEl.style.left = x + 'px';
            starEl.style.top = y + 'px';
            starEl.style.display = 'block';

            // Automatic despawn window after 6 seconds if missed
            setTimeout(() => {
                starEl.style.display = 'none';
            }, 6000);
        }

        starEl.addEventListener('click', () => {
            starEl.style.display = 'none';
            isFrenzyActive = true;
            frenzyTimeRemaining = 10;
            achievements.cosmicLuck = true;
            
            frenzyBanner.style.display = 'block';
            frenzyTimerEl.innerText = frenzyTimeRemaining;
            
            playTone(900, 0.5, 'square');
            updateDisplay();
        });

        // --- TICK LOOPS ---
        // Main incremental generator loop (100ms ticks)
        setInterval(() => {
            score += getTotalCPS() / 10;
            updateDisplay();
        }, 100);

        // System clock secondary tracking loop (1 second intervals)
        setInterval(() => {
            // Handle Frenzy breakdown
            if (isFrenzyActive) {
                frenzyTimeRemaining--;
                frenzyTimerEl.innerText = frenzyTimeRemaining;
                if (frenzyTimeRemaining <= 0) {
                    isFrenzyActive = false;
                    frenzyBanner.style.display = 'none';
                }
            }

            // 8% chance to spawn a Lucky Star every single second
            if (Math.random() < 0.08) {
                spawnGoldenStar();
            }
        }, 1000);

        // System save configurations
        document.getElementById('btn-save').addEventListener('click', () => { saveGame(); alert("Game Progress Saved!"); });
        document.getElementById('btn-reset').addEventListener('click', () => { if (confirm("Reset everything?")) { localStorage.removeItem('clickerUltimateSave'); location.reload(); } });
        setInterval(() => { saveGame(); }, 10000);

        loadGame();
    </script>
</body>
</html>
