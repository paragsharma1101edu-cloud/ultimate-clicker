<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ultimate Clicker Evolution - God Mode</title>
    <style>
        body { font-family: sans-serif; background: #1a1a22; color: #fff; padding: 20px; }
        .admin-panel { background: #331111; padding: 20px; border: 2px solid #ff0000; margin-top: 20px; border-radius: 10px; }
        input { padding: 8px; margin: 5px; background: #000; color: #fff; border: 1px solid #555; }
        button { padding: 8px 15px; cursor: pointer; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <h1>Ultimate Clicker</h1>
    <div id="game-ui">
        <h1 id="score-display">0</h1>
        <button onclick="clickAction()">CLICK!</button>
    </div>

    <!-- GOD MODE PANEL -->
    <div id="admin-panel" style="display:none;" class="admin-panel">
        <h3 style="color:#ff4444;">GOD MODE CONTROLS</h3>
        <input type="text" id="target-player" placeholder="Player Name">
        <input type="number" id="new-score" placeholder="New Score">
        <button onclick="adminModifyScore()">Set Score</button>
        <button onclick="adminToggleBan()">Ban/Unban</button>
        <button onclick="adminTriggerFrenzy()" style="background:#ffcc00;">START GLOBAL FRENZY (2m)</button>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDHPOYhJ4Iw5bRx83xf0P9bV6U-AE7lAJo", authDomain: "ultimate-clicker-57b78.firebaseapp.com", projectId: "ultimate-clicker-57b78", storageBucket: "ultimate-clicker-57b78.firebasestorage.app", messagingSenderId: "62006979685", appId: "1:62006979685:web:ae4f3b4f0bc330c58daa8c" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        let username = localStorage.getItem('clickerUsername') || "Player";

        // Admin Auth
        function loginAdmin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).then((res) => {
                if(res.user.email === "paragsharma1101edu@gmail.com") {
                    document.getElementById('admin-panel').style.display = "block";
                }
            });
        }

        async function adminModifyScore() {
            const name = document.getElementById('target-player').value;
            const score = parseInt(document.getElementById('new-score').value);
            await db.collection("leaderboard").doc(name).update({ highScore: score });
            alert("Score updated!");
        }

        async function adminToggleBan() {
            const name = document.getElementById('target-player').value;
            const doc = await db.collection("leaderboard").doc(name).get();
            const banned = doc.data().isBanned || false;
            await db.collection("leaderboard").doc(name).update({ isBanned: !banned });
            alert("Ban status toggled!");
        }

        async function adminTriggerFrenzy() {
            await db.collection("global_events").doc("frenzy").set({ active: true, timestamp: Date.now() });
            alert("Global Frenzy Started!");
        }

        // Check if Banned
        db.collection("leaderboard").doc(username).onSnapshot(doc => {
            if(doc.exists && doc.data().isBanned) {
                document.body.innerHTML = "<h1>YOU ARE BANNED FROM THE GAME</h1>";
            }
        });
    </script>
    <button onclick="loginAdmin()">Admin Login</button>
</body>
</html>
